name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shriram-financial/package-lock.json

      - name: Install dependencies
        working-directory: shriram-financial
        run: npm ci

      - name: Build site
        working-directory: shriram-financial
        run: npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ubuntu@13.234.46.220
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cd shriram-financial
          zip -r /tmp/site.zip dist/
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no /tmp/site.zip $SERVER:/tmp/site.zip
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $SERVER \
            "sudo rm -rf /var/www/html/* && sudo unzip -o /tmp/site.zip -d /var/www/html/ && sudo chown -R www-data:www-data /var/www/html/"
          rm /tmp/deploy_key
